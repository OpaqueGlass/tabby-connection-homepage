opaqueglasshomepage:
  settings:
    title:
      en_US: "Connection Homepage"
      zh_CN: "连接主页插件设置"
    general:
      en_US: "General"
      zh_CN: "通用设置"
    auto_init:
      en_US: "Auto Start"
      zh_CN: "自动启动"
    auto_init_desc:
      en_US: "Automatically open the homepage when Tabby starts. The startup homepage is optional; in addition to the homepage created by this plugin, the Profile Selector can also be used."
      zh_CN: "在Tabby启动时，自动打开主页。启动的主页是可选的，在选择框了解更多。"
    enable_on_startup:
      en_US: "Enable completion when startup"
      zh_CN: "在Tabby启动后，启用命令补全提示"
    enable_on_startup_desc:
      en_US: "When disabled, the autocomplete menu will not appear automatically, and users will need to enable the feature manually. You can manually control the auto-completion feature via the bird icon in the toolbar. Green means it is enabled."
      zh_CN: "禁用后，自动完成菜单不会自动出现，用户需要手动启用该功能。您可以通过工具栏中的小鸟图标手动控制自动完成功能。绿色意味着已启用。"
    menu_show_item_max:
      en_US: Max Hint Item Count
      zh_CN: 提示菜单显示数量限制
    menu_show_item_max_desc:
      en_US: When there are enough matches, regardless of the settings, at least 3 items of each enabled type will be displayed.
      zh_CN: 匹配数量足够的情况下，无论如何设定，各启用类型至少显示3个。
    option_plugin:
      en_US: "Homepage created by this plugin"
      zh_CN: "本插件创建的主页"
    option_original:
      en_US: Tabby's Profiles & Connections
      zh_CN: Tabby设置-配置和连接选项卡
    option_disable:
      en_US: Disable
      zh_CN: 禁用
    option_profile_selector:
      en_US: Tabby's Profile Selector
      zh_CN: Tabby配置文件选择器
    btnOnLeftToolbar:
      en_US: "Show homepage button on the left toolbar"
      zh_CN: "在左侧工具栏显示主页按钮"
    btnOnLeftToolbar_desc:
      en_US: "When enabled, a homepage button will be added to the left toolbar for quick access. Restart Tabby for the changes to take effect."
      zh_CN: "启用后，在左侧工具栏会增加一个主页按钮，方便快速访问。修改此项后需要重启Tabby才能生效。"
    homepageBtnWeight:
      en_US: "Homepage button weight"
      zh_CN: "主页按钮权重"
    homepageBtnWeight_desc:
      en_US: "The weight of the homepage button in the toolbar. The smaller the value, the more forward it is displayed. The default value is 0. Adjusting this value may cause the button to be displayed in an unexpected position, please adjust it with caution. Restart Tabby for the changes to take effect."
      zh_CN: "工具栏中主页按钮的权重，值越小越靠前显示。默认值为0，调整此值可能会导致按钮显示在意想不到的位置，请谨慎调整。修改此项后需要重启Tabby才能生效。"


  # AI相关设置
  ai:
    title:
      en_US: "AI"
      zh_CN: "AI"
    openai_base_url:
      en_US: "Open AI Base URL"
      zh_CN: "Open AI Base URL"
    openai_key:
      en_US: "Open AI Key"
      zh_CN: "Open AI Key"
    openai_key_desc:
      en_US: "Note that all information will be saved in plain text locally"
      zh_CN: "请注意所有信息将明文保存在本地"
    openai_model:
      en_US: "Open AI Model name"
      zh_CN: "Open AI 模型名称"

  # 外观设置
  appearance:
    title:
      en_US: "Appearance"
      zh_CN: "外观"
    font_size:
      en_US: "Font size"
      zh_CN: "字体大小"

  # 历史记录设置
  history:
    title:
      en_US: "History"
      zh_CN: "历史记录"
    manage_desc:
      en_US: "Open \"Developer Tools\", \"Application\", \"Storage\" \"Indexed DB\" in the list on the left, and manage the saved history in \"og_tac_HistoryDB\"."
      zh_CN: "打开\"开发者工具\"，\"应用\"，左侧列表中的\"存储\"\"Indexed DB\"，\"og_tac_HistoryDB\"中管理已保存的历史记录。"
    enable:
      en_US: "Enable the history of user input commands"
      zh_CN: "启用用户输入命令历史"
    enable_desc:
      en_US: "Turning this off will still create the database (but without recording history) and will not clear the history that was previously saved."
      zh_CN: "关闭此项，仍然会创建历史记录数据库（但不记录历史），先前记录的历史不会被自动清除。"
    count_regexp:
      en_US: "Record input commands matched by regular expressions"
      zh_CN: "记录由正则表达式匹配到的命令"
    count_regexp_desc:
      en_US: "It may record incorrect or incomplete commands. When disabled, only input commands matched by the prompt escape sequence will be saved."
      zh_CN: "可能记录到错误或不完整的命令。禁用后，只保存由prompt转义序列匹配的输入命令。"

  arguments:
    title:
      en_US: "Arguments Complete"
      zh_CN: "参数提示"
    manage_desc:
      en_US: "The preset content matched by the argument prompts is generated by AI and has not been reviewed by the developers. Please carefully verify the correctness of the argument prompts. The current functionality is still under testing, and during argument input completion, it may not check for or remove/partially remove existing content. If you encounter any bugs, please provide feedback. If you need more argument prompts, please submit a PR."
      zh_CN: "参数提示匹配到的预设内容由AI生成，开发者没有进行检查，请注意检查内容的正确性；目前功能仍在测试，参数输入上屏时，可能不会判断删除/部分删除已有内容。如有bug请反馈，如需要更多参数提示请PR。"
    enable:
      en_US: "Enable Arguments Complete"
      zh_CN: "启用命令参数提示补全"
    enable_desc:
      en_US: ""
      zh_CN: ""

  # 调试设置
  debug:
    title:
      en_US: "Debug"
      zh_CN: "调试"
    enable_debug:
      en_US: "Enable debug mode and detailed logs"
      zh_CN: "显示详细日志和调错信息"
    log_level_desc:
      en_US: "0 All, 1 log, 2 warn, 3 ErrorOnly, 4 No log"
      zh_CN: "0 输出全部日志，1 输出日志，2 输出警告，3 仅输出错误，4 不输出日志"

  # 通用UI
  ui:
    newprofile:
      en_US: New Profile
      zh_CN: 新连接
    connections:
      en_US: Profiles & Connections
      zh_CN: 配置和连接
    searchPlaceholder:
      en_US: Search connections...
      zh_CN: 输入并检索连接
    loading:
      en_US: "Loading..."
      zh_CN: "加载中..."
    help:
      en_US: "Press Enter to connect to the first search result when results are displayed. Enter the address and press Ctrl+Enter to connect quickly."
      zh_CN: "按下Enter则连接第一个检索结果；输入地址后按下 Ctrl+Enter 快速连接"
    searchResult:
      en_US: "Search Result"
      zh_CN: "检索结果"

  # 支持和反馈
  support:
    give_star_prefix:
      en_US: "⭐ If this project helps you, please"
      zh_CN: "⭐ 如果这个项目对你有帮助，请"
    give_star_link:
      en_US: "give it a star!"
      zh_CN: "点亮Star。"
    give_star_suffix:
      en_US: "Your support is greatly appreciated and motivates me to keep improving it. 😊"
      zh_CN: "感谢你的支持！这将鼓励我继续改进它。😊"
    issue_prefix:
      en_US: "💡 If you encounter any issues,"
      zh_CN: "💡 如果遇到问题，"
    issue_link:
      en_US: "please open an issue on GitHub!"
      zh_CN: "请到Github创建issue"
    issue_suffix:
      en_US: "😊"
      zh_CN: "😊"

  # 测试用例
  test:
    en_US: "test"
    zh_CN: "testA"